/* ── STORAGE ────────────────────────────────────────────────── */
const KEY = "lukkari.v1";
function loadState() { try { const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; } catch{return null;} }
function saveState(s) { try { localStorage.setItem(KEY,JSON.stringify(s)); } catch{} }
function clearStoredSelections() { try { const r=loadState(); if(r){r.selections={};localStorage.setItem(KEY,JSON.stringify(r));} } catch{} }

/* ── EXPORT HELPERS ─────────────────────────────────────────── */
function buildTextExport(school, selections, year) {
  const lines = [];
  lines.push(`LUKUJÄRJESTYS — ${school.name} ${year}`);
  lines.push(`Viety Lukkari.io:sta\n`);
  for (let pi=0; pi<school.periodCount; pi++) {
    lines.push(`${pi+1}. PERIODI`);
    let any = false;
    for (let bi=0; bi<school.palkkiCount; bi++) {
      const v = selections[`p${pi+1}-b${bi+1}`]?.trim();
      if (v) { lines.push(`  Palkki ${bi+1}: ${v}`); any=true; }
    }
    if (!any) lines.push("  (ei kursseja kirjattu)");
    lines.push("");
  }
  lines.push("\nVIIKKONÄKYMÄ");
  for (let pi=0; pi<school.periodCount; pi++) {
    lines.push(`\n${pi+1}. periodi:`);
    const header = "  " + "Aika".padEnd(14) + school.days.map(d=>d.padEnd(10)).join("");
    lines.push(header);
    for (let ti=0; ti<school.times.length; ti++) {
      const row = school.days.map((_, di) => {
        const beam = school.rotation[ti]?.[di];
        if (!beam) return "—".padEnd(10);
        const c = selections[`p${pi+1}-b${beam}`]?.trim();
        return (c||`(${beam})`).substring(0,9).padEnd(10);
      });
      lines.push("  " + school.times[ti].padEnd(14) + row.join(""));
    }
  }
  return lines.join("\n");
}

/* ── ICONS ──────────────────────────────────────────────────── */
const Ico = {

/* ── SETTINGS PANEL ─────────────────────────────────────────── */
function SettingsPanel({ open, onClose, school, selections, year, setYear, onClear, filledCount }) {
  const [copied, setCopied] = useState(false);

  const handleEmail = () => {
    const text = buildTextExport(school, selections, year);
    const subject = encodeURIComponent(`Lukujärjestykseni — ${school.name} ${year}`);
    const body = encodeURIComponent(text);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  };

  const handleDownload = () => {
    const text = buildTextExport(school, selections, year);
    const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `lukkari-${school.id}-${year}.txt`; a.click();
    URL.revokeObjectURL(url);
  };

  const handleCopy = async () => {
    const text = buildTextExport(school, selections, year);
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch{}
  };

  const handlePrint = () => window.print();

  const settingBtn = (icon, label, onClick, danger) => (
    <button onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:10,
      width:"100%", padding:"11px 14px", borderRadius:12, border:"none",
      background: danger ? "rgba(200,60,40,0.07)" : "rgba(255,255,255,0.55)",
      color: danger ? "oklch(0.45 0.18 25)" : "var(--ink)",
      fontSize:13, fontWeight:500, cursor:"pointer",
      transition:"all .14s", textAlign:"left",
      borderWidth:1.5, borderStyle:"solid",
      borderColor: danger ? "rgba(200,60,40,0.15)" : "rgba(255,255,255,0.8)",
    }}
      onMouseEnter={e=>{e.currentTarget.style.background=danger?"rgba(200,60,40,0.12)":"rgba(255,255,255,0.85)";}}
      onMouseLeave={e=>{e.currentTarget.style.background=danger?"rgba(200,60,40,0.07)":"rgba(255,255,255,0.55)";}}
    >
      <span style={{color:danger?"oklch(0.52 0.18 25)":"var(--ink-s)", display:"flex"}}>{icon}</span>
      {label}
    </button>
  );

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{
        position:"fixed",inset:0,zIndex:90,
        background:"rgba(20,10,5,0.18)",
        backdropFilter:"blur(2px)",
        opacity:open?1:0, pointerEvents:open?"all":"none",
        transition:"opacity .22s",
      }}/>
      {/* Drawer */}
      <div className="glass" style={{
        position:"fixed",top:0,right:0,bottom:0,zIndex:91,
        width:320,
        transform:open?"translateX(0)":"translateX(100%)",
        transition:"transform .28s cubic-bezier(.4,0,.2,1)",
        borderRadius:"24px 0 0 24px",
        borderRight:"none",
        display:"flex",flexDirection:"column",
        overflow:"hidden",
      }}>
        {/* Drawer header */}
        <div style={{
          display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"20px 20px 16px",
          borderBottom:"1px solid rgba(255,255,255,0.6)",
        }}>
          <span className="fr" style={{fontSize:20,fontWeight:500,color:"var(--ink)"}}>Asetukset</span>
          <button className="icon-btn" onClick={onClose} style={{
            width:32,height:32,borderRadius:"50%",
            background:"rgba(255,255,255,0.5)",
            border:"1.5px solid rgba(255,255,255,0.8)",
            color:"var(--ink-s)",
          }}>{Ico.close}</button>
        </div>

        {/* Drawer body */}
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:20}}>

          {/* Lukuvuosi */}
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)",marginBottom:8}}>Lukuvuosi</div>
            <div style={{display:"flex",gap:6}}>
              {["2025–2026","2026–2027","2027–2028"].map(y=>(
                <button key={y} onClick={()=>setYear(y)} style={{
                  flex:1,padding:"7px 4px",borderRadius:10,fontSize:11,fontWeight:600,cursor:"pointer",

                  color:year===y?"var(--accent)":"var(--ink-s)",
                  transition:"all .14s",
                }}>{y}</button>
              ))}
            </div>
          </div>

          {/* Export */}
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)",marginBottom:8}}>
              Vie & jaa
              {filledCount===0 && <span style={{marginLeft:6,fontWeight:400,textTransform:"none",letterSpacing:0,color:"var(--ink-f)"}}>— lisää ensin kursseja</span>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,opacity:filledCount===0?0.45:1,pointerEvents:filledCount===0?"none":"all"}}>
              {settingBtn(Ico.mail, "Lähetä sähköpostiin", handleEmail)}
              {settingBtn(Ico.download, "Lataa tekstitiedostona", handleDownload)}
              {settingBtn(copied?Ico.check:"", copied?"Kopioitu!" : "Kopioi leikepöydälle", handleCopy)}
              {settingBtn(Ico.print, "Tulosta / Tallenna PDF:ksi", handlePrint)}
            </div>
          </div>

          {/* About */}
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)",marginBottom:8}}>Koulut</div>
            <div style={{background:"rgba(255,255,255,0.45)",border:"1.5px solid rgba(255,255,255,0.8)",borderRadius:12,padding:"10px 14px"}}>
              {SCHOOLS.map(s=>(
                <div key={s.id} style={{fontSize:12,color:"var(--ink-s)",padding:"3px 0",display:"flex",justifyContent:"space-between"}}>
                  <span>{s.name}</span>
                  <span style={{color:"var(--ink-f)"}}>{s.palkkiCount}P</span>
                </div>
              ))}
            </div>
          </div>

          {/* Danger */}
          <div>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)",marginBottom:8}}>Hallinta</div>
            {settingBtn(Ico.trash, "Tyhjennä kaikki kurssit", onClear, true)}
          </div>

          {/* Footer info */}
          <div style={{marginTop:"auto",padding:"12px 0 0",borderTop:"1px solid rgba(200,195,190,0.3)"}}>
            <p style={{fontSize:11,color:"var(--ink-f)",lineHeight:1.5}}>
              Lukkari.io — kaikki tiedot tallennetaan vain tällä laitteella.<br/>
              Ei tiliä. Ei seurantaa.
            </p>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── HEADER ─────────────────────────────────────────────────── */
function Header({ tab, setTab, onGear }) {
  return (
    <header style={{
      display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"0 28px",height:60,
      background:"rgba(255,255,255,0.42)",
      borderBottom:"1.5px solid rgba(255,255,255,0.72)",
      backdropFilter:"blur(28px) saturate(1.5)",
      WebkitBackdropFilter:"blur(28px) saturate(1.5)",
      position:"sticky",top:0,zIndex:50,
    }}>
      <span className="fr" style={{fontSize:22,fontWeight:500,letterSpacing:"-0.02em"}}>
        Lukkari<span style={{color:"var(--accent)"}}>.</span><span style={{color:"var(--ink-s)"}}>io</span>
      </span>
      <div className="tab-pill">
        <button className={"tab-btn"+(tab==="free"?" on":"")} onClick={()=>setTab("free")}>Free</button>
        <button className={"tab-btn"+(tab==="pro"?" on":"")} onClick={()=>setTab("pro")}>Pro</button>
      </div>
      <button className="icon-btn" onClick={onGear} style={{
        width:36,height:36,borderRadius:"50%",
        background:"rgba(255,255,255,0.5)",
        border:"1.5px solid rgba(255,255,255,0.8)",
        color:"var(--ink-s)",
      }} title="Asetukset">{Ico.gear}</button>
    </header>
  );
}

/* ── SCHOOL PICKER ──────────────────────────────────────────── */

    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)"}}>Koulu</span>
      <div style={{position:"relative"}}>
        <select value={schoolId} onChange={e=>setSchoolId(e.target.value)} style={{
          background:"rgba(255,255,255,0.62)",border:"1.5px solid rgba(255,255,255,0.88)",
          borderRadius:99,padding:"5px 30px 5px 14px",fontSize:13,fontWeight:500,
          color:"var(--ink)",cursor:"pointer",outline:"none",
          backdropFilter:"blur(8px)",appearance:"none",
        }}>
          {SCHOOLS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <svg style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="10" height="7" viewBox="0 0 10 7"><path d="M1 1l4 4 4-4" stroke="var(--ink-s)" strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>
      </div>

}

/* ── CHOICE GRID ────────────────────────────────────────────── */
function ChoiceGrid({ school, selections, onChange }) {
  const refs = useRef({});

  const jump = useCallback((e, pi, bi) => {
    if (e.key !== "Tab") return;
    e.preventDefault();
    let np=pi, nb=bi+1;
    if (nb > school.palkkiCount) { nb=1; np=pi+1; }
    if (np > school.periodCount) { np=1; nb=1; }
    refs.current[`p${np}-b${nb}`]?.focus();
  }, [school]);

  return (
    <div className="mx-scroll">
      <table style={{borderCollapse:"separate",borderSpacing:"5px 4px",width:"100%",minWidth:560}}>
        <thead>
          <tr>
            <th style={{width:72}}></th>
            {Array.from({length:school.periodCount},(_,pi)=>{
              const t=PTINTS[pi];
              return (
                <th key={pi} style={{textAlign:"center",padding:"0 2px 12px"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                    <span className="fr" style={{fontSize:24,fontWeight:500,color:t.l,fontStyle:"italic",lineHeight:1}}>{pi+1}</span>
                    <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-f)"}}>periodi</span>
                  </div>
                </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {Array.from({length:school.palkkiCount},(_,bi)=>(
            <tr key={bi}>
              <td style={{padding:"1px 8px 1px 0",verticalAlign:"middle"}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",lineHeight:1}}>
                  <span className="fr" style={{fontSize:19,fontWeight:500,color:"var(--ink-s)",fontStyle:"italic"}}>{bi+1}</span>
                  <span style={{fontSize:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--ink-f)",marginTop:1}}>palkki</span>
                </div>
              </td>
              {Array.from({length:school.periodCount},(_,pi)=>{
                const k=`p${pi+1}-b${bi+1}`, v=selections[k]||"", filled=v.trim().length>0, t=PTINTS[pi];
                return (
                  <td key={pi} style={{padding:0}}>
                    <div style={{
                      height:54,borderRadius:10,
                      background:filled?t.bg:"rgba(255,255,255,0.42)",
                      border:`1.5px solid ${filled?t.b:"rgba(255,255,255,0.82)"}`,
                      transition:"all .14s",
                      display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",
                    }}>
                      <input
                        ref={el=>{if(el)refs.current[k]=el;}}
                        className="ci"
                        type="text" value={v} placeholder="+"
                        maxLength={20}
                        onChange={e=>onChange(k,e.target.value)}
                        onKeyDown={e=>jump(e,pi+1,bi+1)}
                        style={{fontSize:v.length>8?12:15}}
                      />
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"var(--ink-f)"}}>Tab-näppäimellä seuraavaan soluun →</span>
      </div>
    </div>
  );
}

/* ── PERIOD CARD ────────────────────────────────────────────── */
function PeriodCard({ pi, school, selections }) {
  const t = PTINTS[pi];
  const {rotation,times,days,palkkiCount} = school;
  const count = Array.from({length:palkkiCount},(_,bi)=>selections[`p${pi+1}-b${bi+1}`]?.trim()?1:0).reduce((a,b)=>a+b,0);

  return (
    <div className="glass" style={{borderRadius:20,padding:"20px 18px",overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
        <span className="fr" style={{fontSize:26,fontWeight:500,fontStyle:"italic",color:t.l}}>{pi+1}.</span>
        <span className="fr" style={{fontSize:17,fontWeight:500,color:"var(--ink)"}}>periodi</span>
        <div style={{flex:1}}/>
        <span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:t.l}}>
          {count} {count===1?"kurssi":"kurssia"}
        </span>
      </div>
      <div style={{height:2,width:32,borderRadius:99,background:t.l,opacity:.65,marginBottom:14}}/>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"separate",borderSpacing:"3px 2px",width:"100%",minWidth:260}}>
          <thead>
            <tr>
              <th style={{width:60,padding:"0 4px 5px 0"}}/>
              {days.map((d,di)=>(
                <th key={di} style={{textAlign:"center",padding:"0 1px 5px"}}>
                  <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-s)"}}>{d}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {times.map((time,ti)=>(
              <tr key={ti}>
                <td style={{padding:"1px 5px 1px 0",verticalAlign:"middle",whiteSpace:"nowrap"}}>
                  <span style={{fontSize:9,fontWeight:500,color:"var(--ink-f)",fontVariantNumeric:"tabular-nums"}}>{time}</span>
                </td>
                {days.map((_,di)=>{
                  const beam = rotation[ti]?.[di];
                  const ck = beam?`p${pi+1}-b${beam}`:null;
                  const course = ck?selections[ck]?.trim():null;
                  const has = course && course.length>0;
                  return (
                    <td key={di} style={{textAlign:"center",padding:1}}>
                      <div style={{
                        height:34,minWidth:48,borderRadius:7,
                        display:"flex",alignItems:"center",justifyContent:"center",
                        background:beam===null?"transparent":has?t.bg:"rgba(255,255,255,0.32)",
                        border:beam===null?"none":has?`1px solid ${t.b}`:"1px solid rgba(200,195,190,0.35)",
                      }}>
                        {beam===null ? null : has ? (
                          <span className="fr" style={{fontSize:course.length>6?10:12,fontWeight:500,color:"var(--ink)"}}>{course}</span>
                        ) : (
                          <span style={{fontSize:9,color:"var(--ink-f)",fontWeight:500}}>{beam}.</span>
                        )}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── WEEK PREVIEW ───────────────────────────────────────────── */
function WeekPreview({ school, selections }) {
  return (
    <div style={{marginTop:52}}>
      <div style={{marginBottom:24}}>
        <h2 className="fr" style={{fontSize:36,fontWeight:500,letterSpacing:"-0.02em",color:"var(--ink)"}}>Viikkonäkymä</h2>
        <p style={{fontSize:13,color:"var(--ink-s)",marginTop:4}}>Sama kiertokaavio joka viikko — kurssit vaihtuvat periodeittain</p>
      </div>

        {Array.from({length:school.periodCount},(_,pi)=>(
          <PeriodCard key={pi} pi={pi} school={school} selections={selections}/>
        ))}
      </div>
    </div>
  );
}

/* ── CONFIRM DIALOG ─────────────────────────────────────────── */
function ConfirmClear({ onConfirm, onCancel }) {
  return (
    <div onClick={onCancel} style={{position:"fixed",inset:0,zIndex:200,background:"rgba(20,10,5,0.28)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="glass" onClick={e=>e.stopPropagation()} style={{borderRadius:20,padding:"28px 28px",maxWidth:320,width:"100%"}}>
        <h3 className="fr" style={{fontSize:22,fontWeight:500,marginBottom:8}}>Tyhjennä kaikki?</h3>
        <p style={{fontSize:13,color:"var(--ink-s)",lineHeight:1.55,marginBottom:22}}>Kaikki kurssikirjaukset poistetaan pysyvästi. Tätä ei voi perua.</p>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{padding:"8px 18px",borderRadius:99,border:"1.5px solid rgba(200,195,190,0.7)",background:"transparent",fontSize:13,fontWeight:500,cursor:"pointer",color:"var(--ink-s)"}}>Peruuta</button>
          <button onClick={onConfirm} style={{padding:"8px 18px",borderRadius:99,border:"none",background:"oklch(0.50 0.15 25)",color:"white",fontSize:13,fontWeight:600,cursor:"pointer"}}>Tyhjennä</button>
        </div>
      </div>
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("free");
  const [schoolId, setSchoolId] = useState("otaniemi");
  const [selections, setSelections] = useState({});
  const [year, setYear] = useState("2026–2027");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);

  useEffect(() => {
    const s = loadState();
    if (s) {
      if (s.schoolId) setSchoolId(s.schoolId);
      if (s.selections) setSelections(s.selections);
      if (s.year) setYear(s.year);
    }
  }, []);

  useEffect(() => {
    saveState({schoolId, selections, year});
  }, [schoolId, selections, year]);

  const onChange = useCallback((k, v) => {
    setSelections(prev => {
      const n = {...prev};
      if (!v.trim()) delete n[k]; else n[k]=v;
      return n;
    });
  }, []);

  const doClear = useCallback(() => {
    setSelections({});
    clearStoredSelections();
    setConfirmClear(false);
    setSettingsOpen(false);
  }, []);

  const school = SCHOOLS.find(s=>s.id===schoolId)||SCHOOLS[0];
  const filledCount = Object.values(selections).filter(v=>v?.trim()).length;

  return (
    <div style={{minHeight:"100vh"}}>
      <Header tab={tab} setTab={setTab} onGear={()=>setSettingsOpen(true)}/>
      <SettingsPanel
        open={settingsOpen} onClose={()=>setSettingsOpen(false)}
        school={school} selections={selections}
        year={year} setYear={setYear}
        onClear={()=>setConfirmClear(true)}
        filledCount={filledCount}
      />

      {tab==="pro" ? <ProComingSoon/> : (
        <main style={{maxWidth:1120,margin:"0 auto",padding:"36px 24px 80px"}}>
          {/* Hero */}
          <div style={{marginBottom:36}}>
            <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:"8px 20px",marginBottom:14}}>
              <SchoolPicker schoolId={schoolId} setSchoolId={setSchoolId}/>
              <div style={{height:14,width:1,background:"rgba(200,195,190,0.45)"}}/>
              <span style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:"var(--ink-f)"}}>{year}</span>
            </div>
            <h1 className="fr" style={{fontSize:48,fontWeight:500,letterSpacing:"-0.025em",lineHeight:1.05,color:"var(--ink)"}}>
              {school.name}
            </h1>
            <div style={{display:"flex",alignItems:"center",gap:12,marginTop:8,flexWrap:"wrap"}}>
              <p style={{fontSize:13,color:"var(--ink-s)"}}>Täytä palkit, näe lukujärjestyksesi</p>
              {filledCount>0 && (
                <span style={{
                  fontSize:11,fontWeight:600,
                  background:"rgba(255,255,255,0.55)",border:"1.5px solid rgba(255,255,255,0.85)",
                  borderRadius:99,padding:"2px 10px",color:"var(--accent)",
                  backdropFilter:"blur(6px)",
                }}>{filledCount} kurssia kirjattu</span>
              )}
            </div>
            {school.note && (
              <p style={{fontSize:11,color:"var(--ink-f)",marginTop:6,fontStyle:"italic"}}>{school.note}</p>
            )}
          </div>

          {/* Matrix */}
          <div className="glass" style={{borderRadius:24,padding:"24px 24px 18px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:8}}>
              <h2 className="fr" style={{fontSize:20,fontWeight:500,color:"var(--ink)"}}>Kurssimatriisi</h2>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:10,color:"var(--ink-f)",fontWeight:500}}>
                  {school.palkkiCount} palkkia · {school.periodCount} periodia
                </span>
                {filledCount>0 && (
                  <button onClick={()=>setConfirmClear(true)} style={{
                    fontSize:11,color:"var(--ink-f)",background:"transparent",border:"none",
                    cursor:"pointer",padding:"2px 6px",borderRadius:6,
                    textDecoration:"underline",textUnderlineOffset:3,
                  }}>Tyhjennä</button>
                )}
              </div>
            </div>
            <ChoiceGrid school={school} selections={selections} onChange={onChange}/>
          </div>

          <WeekPreview school={school} selections={selections}/>
        </main>
      )}

      {/* Saved pill */}
      {filledCount>0 && tab==="free" && !settingsOpen && (
        <div style={{
          position:"fixed",bottom:20,right:20,
          background:"rgba(255,255,255,0.72)",border:"1.5px solid rgba(255,255,255,0.92)",
          borderRadius:99,backdropFilter:"blur(12px)",
          padding:"6px 14px",display:"flex",alignItems:"center",gap:6,
          boxShadow:"0 3px 14px rgba(0,0,0,0.07)",
          pointerEvents:"none",
        }}>
          <div style={{width:5,height:5,borderRadius:"50%",background:"oklch(0.58 0.15 150)"}}/>
          <span style={{fontSize:11,fontWeight:500,color:"var(--ink-s)"}}>Tallennettu</span>
        </div>
      )}

      {confirmClear && <ConfirmClear onConfirm={doClear} onCancel={()=>setConfirmClear(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
